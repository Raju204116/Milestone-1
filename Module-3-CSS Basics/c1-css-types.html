
What is CSS?
CSS (Cascading Style Sheets) is used to style HTML elements.




<!-- There are 3 Ways to Add CSS with html -->

1.Inline CSS : Quick but messy
<!-- index.html -->
<h1 style="color:red;">Hello</h1>




2.Internal CSS : Good for single page demos
<!-- index.html -->
<head>
    <style>
        h1{
            color:red;
        }
    </style>
</head>




3.External CSS : Best for real-projects. Clean & reusable
<!-- index.html -->
 <link rel="stylesheet" href="style.css">


 <!-- style.css -->
  h1{
    color:red;
}
