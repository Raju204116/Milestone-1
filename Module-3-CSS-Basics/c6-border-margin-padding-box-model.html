
<!-- 
 CSS Box Model

Every HTML element is treated as a rectangular box. The CSS Box Model describes how much space an element occupies.

The box model has 4 parts:

+---------------------------+
|          Margin           |
|  +---------------------+  |
|  |       Border        |  |
|  |  +---------------+  |  |
|  |  |    Padding    |  |  |
|  |  | +-----------+ |  |  |
|  |  | |  Content  | |  |  |
|  |  | +-----------+ |  |  |
|  |  +---------------+  |  |
|  +---------------------+  |
+---------------------------+


*********1.Content************
The content is the actual data inside an element.

<p>Hello World</p>



************Padding*****************

Padding is the space between the content and the border. (from border to content gap)

.box {
    padding: 20px;
}

padding-top: 20px;
padding-right: 15px;
padding-bottom: 20px;
padding-left: 15px;

//short-hands 

padding: 20px;            //All four sides = 20px
padding: 20px 10px;       // Top & Bottom = 20px , Left & Right = 10px
padding: 20px 10px 5px;    //Top = 20px , Left & Right = 10px, Bottom = 5px
padding: 20px 15px 10px 5px; //Top = 20px ,Right = 15px, Bottom = 10px,Left = 5px



****************3. Border*****************

border-width: 3px;
border-style: solid;
border-color: blue;

//shorthand:

.box {
    border: 2px solid black;  //width style color
}

//other styles:  solid,dashed, dotted, double,groove, ridge,none

border-radius: 10px;
border-radius: 50%;




****************4.Margin*********************
Margin is the space outside the border. (From Screen top to border gap)

.box {
    margin: 20px;
}

margin-top: 20px;
margin-right: 10px;
margin-bottom: 20px;
margin-left: 10px;

//shorthand : same as padding

margin: auto   //Used to center a block element horizontally.




********************box-sizing***********************
Controls how width/height are calculated

.box {
    width: 300px;
    padding: 20px;
    border: 5px solid black;
    margin: 10px;
}

Actual occupied width:

300 (content)
+40 (padding)
+10 (border)
+20 (margin)
--------------
370px

Here, padding is added on both sides (20px × 2 = 40px), 
and so are border (5px × 2 = 10px) and margin (10px × 2 = 20px).

It's happening because of the content-box .
box-sizing: content-box; (by default)

ex:
.box {
    width: 300px;
    padding: 20px;
    border: 5px solid black;
    box-sizing: content-box;
} 
Total width: 300 + 40 + 10 = 350px





//////
If we use border-box , then it will remove.
.box {
    width: 300px;
    padding: 20px;
    border: 5px solid black;
    box-sizing: border-box;  //recommended
}
 
Total width: 300px    //The padding and border are included inside the specified width.

Using box-sizing: border-box makes layout sizing more predictable and is the preferred approach in modern CSS.



-->


<!-- Coding Example -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>

    <style>
        .box{
            width: 300px;
            border: 5px solid blue;
            padding : 30px;
            margin : 20px;
            border-radius: 10px;
            background-color: blanchedalmond;
            text-align: center;

        }
    </style>


</head>
<body>
    
    <div class="box">
        Hello CSS
    </div>


</body>
</html>
