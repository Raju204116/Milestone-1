| `background-image`      | `url("image.jpg")`                      | Sets the background image                    |
| `background-repeat`     | `no-repeat`                             | Prevents repeating                           |

//details : 

âś…1. background-image
The background-image property sets an image as an element's background.

//syntax : background-image: url("image.jpg");

//ex :
body {
    background-image: url("background.jpg");
}



âś…2. background-repeat : Controls whether the image repeats.

background-repeat: repeat;
background-repeat: no-repeat;

| Value       | Description                                  |
| ----------- | -------------------------------------------- |
| `repeat`    | Default; repeats horizontally and vertically |
| `repeat-x`  | Repeats horizontally only                    |
| `repeat-y`  | Repeats vertically only                      |
| `no-repeat` | Shows the image only once                    |


âś…3. background-size : Controls the image size.

background-size: cover;

| Value         | Description                             |
| ------------- | --------------------------------------- |
| `cover`       | Fill the entire container (may crop the image).   |
| `contain`     | Show the entire image (may leave empty space in the container).    |
| `100% 100%`   | Stretches the image to fill the element |
| `300px 200px` | Fixed width and height                  |




âś…4. background-position : Positions the image.

background-position: center;
background-position: top;
background-position: bottom;
background-position: left;
background-position: right;
background-position: center center;


âś…5. background-attachment : Controls whether the background scrolls.

background-attachment: fixed;

| Value    | Description                                   |
| -------- | --------------------------------------------- |
| `scroll` | Default; background scrolls with the page     |
| `fixed`  | Background stays fixed while the page scrolls |
| `local`  | Background scrolls with the element's content |


âś…6. background-color : Sets a background color.

background-color: lightblue;



âś…Shorthand
.hero {
    background: url("nature.jpg") no-repeat center/cover;
}


âś…linear-gradient

background: linear-gradient(direction, color1, color2);
direction â†’ Optional (top, bottom, left, right, angle)
color1 â†’ Starting color
color2 â†’ Ending color

background: linear-gradient(90deg, red, blue);
