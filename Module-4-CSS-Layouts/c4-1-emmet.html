
<!--
✅What is Emmet? 
Emmet is a shorthand syntax that lets you write HTML (and some CSS) much faster.

Instead of writing the full HTML manually, you type an abbreviation and press Tab (or Enter, depending on your editor), 
and Emmet expands it into complete code.

NB : tab সবসময় শেষে মারতে হবে অন্যথায় কাজ করবে না । সাজেশন না আসলে just লাস্টের একটা word কেটে দিয়ে আবার লিখলেই চলে আসবে ।


For example:
ul>li*3  , Press Tab, and it becomes:

<ul>
    <li></li>
    <li></li>
    <li></li>
</ul>


Basic Emmet Syntax :

| Symbol | Meaning           | Example              |
| ------ | ----------------- | -------------------- |
| `>`    | Child             | `div>p`              |
| `+`    | Sibling           | `h1+p`               |
| `*`    | Multiple elements | `li*5`               |
| `.`    | Class             | `div.container`      |
| `#`    | ID                | `div#header`         |
| `[]`   | Attributes        | `input[type="text"]` |
| `{}`   | Text content      | `p{Hello}`           |
| `()`   | Grouping          | `(header>nav)+main`  |
| `^`    | Move up one level | `div>p^h1`           |
| `&`    | numbering         | ul>li{Item $}*3      |


-->

<!-- Examples -->

<!-- ✅ 1. Child (>) -->

<!-- div>p -->
<div>
    <p></p>
</div>



<!--✅2. Sibling (+)  -->

<!-- h1+p -->
<h1></h1>
<p></p>


<!--✅3. Multiple Elements (*)  -->

<!-- ul>li*5 -->

<ul>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
</ul>



<!--✅ 4. Class (.) -->

<!-- div.container -->
<div class="container"></div>



<!-- div.box.card.active -->
<div class="box card active"></div>



<!--✅5. ID (#)  -->

<!-- div#header -->
<div id="header"></div>


<!--✅ 6. Class + ID -->

<!-- div#header.container -->
<div id="header" class="container"></div>



<!--✅7. Attributes [] -->

<!-- input[type="text"] -->
<input type="text">

<!-- a[href="#"] -->
<a href="#"></a>



<!--✅ 8. Text {} -->

<!-- h1{welcome} -->
<h1>welcome</h1>




<!--✅9. Grouping ()  -->

<!-- (header>nav)+main+footer -->
<header>
    <nav></nav>
</header>
<main></main>
<footer></footer>



<!--✅ 10. Move Up ^ -->

<!-- div>p^h1 -->
<div>
    <p></p>
</div>
<h1></h1>


<!--✅11. Numbering $  -->

<!-- ul>li*5{item-$} -->

<ul>
    <li>item-1</li>
    <li>item-2</li>
    <li>item-3</li>
    <li>item-4</li>
    <li>item-5</li>
</ul>
