<!-- 
 
✅CSS Positioning

The position property controls where an element is placed on a webpage.

There are 5 main values:

| Position   | Common Uses                                               |
| ---------- | --------------------------------------------------------- |
| `static`   | Default layout                                            |
| `relative` | Small adjustments, reference parent for absolute children |
| `absolute` | Badges, dropdowns, overlays, icons                        |
| `fixed`    | Floating buttons, chat widgets, fixed navigation          |
| `sticky`   | Sticky headers, navigation bars, table headers            |


//other values :  top, right, bottom, left, z-index


✅********details***********

👍1. position: static  //This is the default position for all HTML elements
 //top, right, bottom, and left do not work here
 .box {
    position: static;
}

👍2. position: relative
The element stays in the normal document flow, but you can move it relative to its original position.

.box {
    position: relative;
    left: 40px;
    top: 20px;
}

before : 
+------+
| Box  |
+------+

after : 
(original position remains reserved)

        +------+
        | Box  |
        +------+



👍3. position: absolute
The element is removed from the normal document flow.

It is positioned relative to its nearest positioned ancestor (an ancestor with position: relative, absolute, fixed, or sticky).


It is positioned relative to its nearest positioned ancestor (an ancestor with position: relative, absolute, fixed, or sticky).


<div class="container">
    <div class="box">Box</div>
</div>

//css
.container {
    position: relative;
    width: 300px;
    height: 200px;
    border: 2px solid black;
}
.box {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 80px;
    height: 80px;
    background: tomato;
}

output: 
+-------------------------+
|                  +----+ |
|                  |Box | |
|                  +----+ |
|                         |
+-------------------------+

If there is no positioned parent,
then the .box is positioned relative to the entire page (viewport) instead.



👍4. position: fixed
The element is positioned relative to the browser window (viewport).

It stays in the same place even when you scroll.

.chat-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

------------------------
|                      |
|                      |
|                  💬  |
------------------------


//Common uses: Chat buttons,  "Back to Top" buttons, Floating action buttons


👍5. position: sticky
A sticky element behaves like:

-relative until a certain scroll position.
-Then it becomes fixed.

header {
    position: sticky;
    top: 0;
}


//Common uses: Sticky navigation bars , Table headers, Side menus


👍z-index

Controls which element appears on top when elements overlap.
Note: z-index only works on positioned elements (or some layout items like flex/grid items).


.box1 {
    position: absolute;
    z-index: 1;
}

.box2 {
    position: absolute;
    z-index: 2;
}

// output : Higher z-index = appears above lower ones.
+---------+
| Box 2   |   ← z-index:2
+---------+

+---------+
| Box 1   |
+---------+

-->

<!-- coding example -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning</title>

    <style>
        .container {
            position: relative;
            width: 300px;
            height: 200px;
            border: 2px solid black;
        }

        .box {
            position: absolute;
            top: 30px;
            left: 40px;

            width: 80px;
            height: 80px;

            background: tomato;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box">A</div>
    </div>
</body>

</html>
