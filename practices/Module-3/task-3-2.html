<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-3-2</title>

    <style>
        p {
            color: rgb(175, 38, 146);
        }

        /* num2 */
        .highlight {
            color: green
        }
        
        .error {
            margin-top: 10px;
            font-style: italic;
        }

        /* num3 */
        #unique {
            text-decoration: underline;
        }

        /*num4: this is unerversal selector, we need to do this in order to reset the global margin & padding  */

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        /* num5 */
        .immediate>p {
            font-style: italic;
            color: black;
            margin: 20px;
        }

        .immediate p {
            text-decoration: line-through;
        }
    </style>


</head>

    <p>para3</p>

    </div>

    <!-- num3 -->

    <!-- num 5 -->

        <p>Immediate child</p>
        <div>
            <p>not immediate</p>
        </div>
    </div>
